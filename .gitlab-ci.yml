# ─────────────────────────────────────────────────────────────
# Atlas Immobilier — GitLab CI/CD Pipeline with Docker Build Cloud
#
# Déploie sur master branch uniquement
# Change detection automatique :
#   - backend/ modifié → test backend → build multiplatform → deploy
#   - frontend/ modifié → test frontend → build multiplatform → deploy
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DEPLOY_SSH_KEY   — private ed25519 key for deployment
#   DOCKER_USER      — Docker Hub username
#   DOCKER_PAT       — Docker Hub personal access token
# ─────────────────────────────────────────────────────────────

stages:
  - test
  - build
  - deploy

variables:
  DEPLOY_HOST: "46.225.187.158"
  DEPLOY_USER: "lamal"
  DEPLOY_DIR: "/opt/atlas"
  DOCKER_REGISTRY: "docker.io"
  DOCKER_REGISTRY_IMAGE: "afroware/atlas"
  DOCKER_BUILDX_DRIVER: "cloud"
  DOCKER_BUILDX_BUILDER: "afroware/immo"

# ── Reusable Docker + buildx setup ────────────────────────────────────
.docker_buildx_setup:
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker info
    - echo "$DOCKER_PAT" | docker login --username "$DOCKER_USER" --password-stdin
    - |
      apk add --no-cache curl jq
      ARCH=${CI_RUNNER_EXECUTABLE_ARCH#*/}
      BUILDX_URL=$(curl -s https://raw.githubusercontent.com/docker/actions-toolkit/main/.github/buildx-lab-releases.json | jq -r ".latest.assets[] | select(endswith(\"linux-$ARCH\"))")
      mkdir -vp ~/.docker/cli-plugins/
      curl --silent -L --output ~/.docker/cli-plugins/docker-buildx "$BUILDX_URL"
      chmod a+x ~/.docker/cli-plugins/docker-buildx
    - docker buildx create --use --driver cloud $DOCKER_BUILDX_BUILDER 2>/dev/null || docker buildx use $DOCKER_BUILDX_BUILDER

# ── Reusable SSH setup ────────────────────────────────────────────────────────
.ssh_setup:
  before_script:
    - apt-get update -qq && apt-get install -y -qq rsync openssh-client 2>/dev/null
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
    - chmod 644 ~/.ssh/known_hosts

# ─────────────────────────────────────────────────────────────────────────────────
# BACKEND
# ─────────────────────────────────────────────────────────────────────────────────

test-backend:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
  cache:
    key: "maven-$CI_COMMIT_REF_SLUG"
    paths:
      - backend/.m2/repository/
  script:
    - cd backend
    - mvn -B -ntp verify -Dspring.profiles.active=test
  artifacts:
    reports:
      junit: backend/target/surefire-reports/TEST-*.xml
    expire_in: 1 week
  allow_failure: false
  needs: []

build-backend-multiplatform:
  stage: build
  extends: .docker_buildx_setup
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - backend/**/*
        - infra/Dockerfile.backend
        - .gitlab-ci.yml
  script:
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag "${DOCKER_REGISTRY_IMAGE}:backend-${CI_COMMIT_SHORT_SHA}" \
        --tag "${DOCKER_REGISTRY_IMAGE}:backend-latest" \
        --push \
        --file infra/Dockerfile.backend \
        .
  allow_failure: false
  needs:
    - job: test-backend

deploy-backend:
  stage: deploy
  image: debian:bookworm-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - backend/**/*
        - infra/docker-compose.yml
        - .gitlab-ci.yml
  needs:
    - job: test-backend
    - job: build-backend-multiplatform
  extends: .ssh_setup
  script:
    - echo "→ Pulling code and rebuilding backend on $DEPLOY_HOST…"
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        set -e
        cd $DEPLOY_DIR
        git fetch origin && git reset --hard origin/master
        cd infra
        docker compose build backend
        docker compose up -d --no-deps backend
        echo '✓ Backend container restarted'
      "
    - echo "→ Waiting for health check…"
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        for i in \$(seq 1 24); do
          STATUS=\$(docker inspect --format='{{.State.Health.Status}}' backend_app 2>/dev/null || echo 'unknown')
          printf '  [%d/24] backend_app: %s\n' \"\$i\" \"\$STATUS\"
          if [ \"\$STATUS\" = 'healthy' ]; then
            echo '✓ Backend is healthy'
            exit 0
          fi
          sleep 5
        done
        echo '✗ Backend did not become healthy within 2 minutes'
        echo '--- Backend logs (last 40 lines) ---'
        docker logs backend_app --tail=40
        exit 1
      "
  environment:
    name: production/backend
    url: https://api.afroware.app
  allow_failure: false

# ─────────────────────────────────────────────────────────────────────────────────
# FRONTEND
# ─────────────────────────────────────────────────────────────────────────────────

test-frontend:
  stage: test
  image: node:18-bookworm
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
  before_script:
    - apt-get update -qq && apt-get install -y -qq chromium
    - export CHROME_BIN=/usr/bin/chromium
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
    policy: pull-push
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run lint
    - npm test -- --watch=false --browsers ChromeHeadlessCI
  artifacts:
    when: always
    reports:
      junit: frontend/junit.xml
    expire_in: 1 week
  allow_failure: false
  needs: []

build-frontend:
  stage: build
  image: node:18-alpine
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
  needs:
    - job: test-frontend
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - frontend/node_modules/
    policy: pull
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    name: "frontend-dist-$CI_COMMIT_SHORT_SHA"
    paths:
      - frontend/dist/frontend/
    expire_in: 1 hour
  allow_failure: false

build-frontend-multiplatform:
  stage: build
  extends: .docker_buildx_setup
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - frontend/**/*
        - infra/Dockerfile.frontend
        - .gitlab-ci.yml
  script:
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag "${DOCKER_REGISTRY_IMAGE}:frontend-${CI_COMMIT_SHORT_SHA}" \
        --tag "${DOCKER_REGISTRY_IMAGE}:frontend-latest" \
        --push \
        --file infra/Dockerfile.frontend \
        .
  allow_failure: false
  needs:
    - job: test-frontend

deploy-frontend:
  stage: deploy
  image: debian:bookworm-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      changes:
        - frontend/**/*
        - infra/nginx.conf
        - .gitlab-ci.yml
  needs:
    - job: build-frontend
      artifacts: true
    - job: build-frontend-multiplatform
  extends: .ssh_setup
  script:
    - echo "→ Syncing dist to $DEPLOY_HOST…"
    - rsync -az --delete --checksum
        frontend/dist/frontend/
        "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/frontend/dist/frontend/"
    - echo "→ Reloading Nginx…"
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" "
        set -e
        cd $DEPLOY_DIR && git fetch origin && git reset --hard origin/master
        docker exec nginx nginx -s reload
        echo '✓ Nginx reloaded'
      "
  environment:
    name: production/frontend
    url: https://afroware.app
  allow_failure: false
