<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlasia · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  .kpi { padding:18px 20px; }
  .kpi .n { font-family:'Playfair Display'; font-weight:500; font-size:38px; color:var(--marine); letter-spacing:-.5px; line-height:1; }
  [data-theme="dark"] .kpi .n { color: var(--marine-light); }
  .kpi .lbl { font-size:12.5px; color:var(--text-muted); margin-top:4px; }
  .kpi .delta { font-size:11.5px; font-weight:600; margin-top:10px; display:inline-flex; align-items:center; gap:4px; }
  .delta.up { color:var(--success); }
  .delta.dn { color:var(--error); }
  .spark { height: 36px; margin-top: 12px; }
  .row-card { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; }
  .row-card:hover { background: var(--surface-offset); }
  .avatar { width:36px; height:36px; border-radius:18px; background:var(--marine-hl); color:var(--marine); display:flex; align-items:center; justify-content:center; font-weight:700; font-family:'Playfair Display'; font-size:15px; }
  .timeline-dot { width:8px; height:8px; border-radius:4px; background:var(--primary); margin-top:8px; flex:none; }
  .timeline-line { width:2px; flex:1; background:var(--divider); margin: 4px auto 0; }

  /* iOS specifics */
  .ios-tab { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; padding:8px 0; color:var(--text-faint); font-size:10px; font-weight:500; }
  .ios-tab.on { color: var(--marine); }
  [data-theme="dark"] .ios-tab.on { color: var(--marine-light); }
  .ios-tabbar { position:absolute; bottom:14px; left:14px; right:14px; height:64px; background:rgba(255,255,255,.85); backdrop-filter: blur(20px); border:1px solid var(--divider); border-radius:24px; display:flex; align-items:center; padding: 0 6px; box-shadow: var(--shadow-md); }
  [data-theme="dark"] .ios-tabbar { background: rgba(24,23,20,.7); }

  /* Android */
  .md-fab { position:absolute; bottom:80px; right:16px; width:56px; height:56px; border-radius:18px; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 12px rgba(0,0,0,.2); z-index:10; }
  .md-bottom { position:absolute; bottom:28px; left:0; right:0; height:64px; background:var(--surface); border-top:1px solid var(--divider); display:flex; }
  .md-tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:10px; color:var(--text-muted); font-weight:500; }
  .md-tab.on { color:var(--marine); }
  [data-theme="dark"] .md-tab.on { color: var(--marine-light); }
  .md-tab.on .pill { background: var(--marine-hl); }
  .md-tab .pill { width:32px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; }
</style>
</head><body>
<div>

<div id="mount"></div>
</div>
