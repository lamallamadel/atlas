<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlasia · Dossiers</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  .ttable { width:100%; border-collapse:separate; border-spacing:0; }
  .ttable th { text-align:left; font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:1.2px; text-transform:uppercase; padding:12px 14px; border-bottom:1px solid var(--divider); background:var(--surface-2); }
  .ttable td { padding:14px; border-bottom:1px solid var(--divider); font-size:13.5px; }
  .ttable tr:hover td { background: var(--surface-offset); }
  .avatar-sm { width:30px; height:30px; border-radius:15px; background:var(--marine-hl); color:var(--marine); display:flex; align-items:center; justify-content:center; font-weight:700; font-family:'Playfair Display'; font-size:12px; flex:none; }
  .kanban-col { background:var(--surface-2); border-radius:14px; padding:10px; min-height: 480px; }
  .kanban-card { background: var(--surface); border:1px solid var(--divider); border-radius:10px; padding:12px; margin-bottom:8px; box-shadow:var(--shadow-xs); }
  .filter-chip { display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 12px; border-radius:16px; border:1px solid var(--divider); font-size:13px; color:var(--text-muted); background:var(--surface); cursor:pointer; }
  .filter-chip.on { border-color:var(--marine); color:var(--marine); background:var(--marine-hl); font-weight:600; }
  [data-theme="dark"] .filter-chip.on { color: var(--marine-light); }

  .ios-tab { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; padding:8px 0; color:var(--text-faint); font-size:10px; font-weight:500; }
  .ios-tab.on { color: var(--marine); }
  [data-theme="dark"] .ios-tab.on { color: var(--marine-light); }
  .ios-tabbar { position:absolute; bottom:14px; left:14px; right:14px; height:64px; background:rgba(255,255,255,.85); backdrop-filter: blur(20px); border:1px solid var(--divider); border-radius:24px; display:flex; align-items:center; padding: 0 6px; box-shadow: var(--shadow-md); }
  [data-theme="dark"] .ios-tabbar { background: rgba(24,23,20,.7); }
  .md-fab { position:absolute; bottom:80px; right:16px; width:56px; height:56px; border-radius:18px; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 12px rgba(0,0,0,.2); z-index:10; }
  .md-bottom { position:absolute; bottom:28px; left:0; right:0; height:64px; background:var(--surface); border-top:1px solid var(--divider); display:flex; }
  .md-tab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:10px; color:var(--text-muted); font-weight:500; }
  .md-tab.on { color:var(--marine); }
  [data-theme="dark"] .md-tab.on { color: var(--marine-light); }
  .md-tab.on .pill { background: var(--marine-hl); }
  .md-tab .pill { width:32px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center; }
</style>
</head><body>
<div>
<div class="page-h"><div><div class="label-eyebrow">Pipeline</div><h2 class="display">Dossiers</h2><div class="sub muted" style="margin-top:6px;">Liste, kanban, filtres. Affichage natif sur chaque plateforme.</div></div></div>
<div id="mount"></div>
</div>

<script src="frames.js"></script>
<script>

const DATA = [

  ['JM','Julien Marchand','Maison · Bordeaux 33000','€480k','rdv','Rendez-vous','11 mai','+33 6 ·· 78 02'],
  ['SL','Sophie Lambert','Appart · Lyon 69006','€340k','new','Nouveau','11 mai','+33 6 ·· 14 73'],
  ['MR','Mehdi Rahman','Riad · Marrakech','€1.1M','won','Gagné','9 mai','+212 6 ·· ·· 09'],
  ['CN','Camille Noël','Studio · Bastille 75011','€295k','rdv','Rendez-vous','8 mai','+33 6 ·· 88 41'],
  ['LD','Léa Dubois','Penthouse · Cannes','€2.3M','qual','Qualification','7 mai','+33 6 ·· 22 65'],
  ['TF','Thomas Faure','Loft · Lille','€225k','lost','Perdu','5 mai','+33 6 ·· 09 77'],
  ['EC','Élise Costa','Maison · Annecy','€780k','rdv','Rendez-vous','5 mai','+33 6 ·· 57 88'],

// ===== Web Desktop =====
const webDesktop = `
<div style="padding: 28px 32px 60px;">
  <div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:22px;">
    <div>

      </tr>`).join('')}

  <div style="margin-top:32px;">
    <div class="label-eyebrow">Vue alternative</div>
    <div style="font-family:'Playfair Display'; font-size:20px; font-weight:600; margin-bottom:14px;">Kanban</div>

        </div>
      `).join('')}

  </div>
</div>`;

// ===== iOS =====

  <div class="ios-tab on">${ICN.files}<span>Dossiers</span></div>

// ===== Android =====
const android = `
<div style="background:var(--surface); padding: 12px 16px 14px; border-bottom:1px solid var(--divider); display:flex; align-items:center; gap:12px;">

</div>

<div style="padding: 14px 16px 0;">
  <div style="font-family:'Playfair Display'; font-size:24px; font-weight:600;">Dossiers</div>

</div>

<div style="display:flex; gap:6px; overflow-x:auto; padding: 14px 16px 6px; scrollbar-width:none;">

<div style="padding: 8px 16px 110px;">

      <div class="avatar-sm" style="width:42px; height:42px; font-size:15px;">${d[0]}</div>
