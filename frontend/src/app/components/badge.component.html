<span
  [class]="getBadgeClasses()"
  [attr.aria-label]="ariaLabel()"
  role="status">
  @if (dot()) {
    <span [class]="getDotClasses()" aria-hidden="true"></span>
  }
  @if (showIconLeft) {
    <mat-icon class="badge-icon badge-icon-left" [attr.aria-hidden]="true">{{ icon() }}</mat-icon>
  }
  <span class="badge-content"><ng-content></ng-content></span>
  @if (showIconRight) {
    <mat-icon class="badge-icon badge-icon-right" [attr.aria-hidden]="true">{{ icon() }}</mat-icon>
  }
</span>
