<div class="spinner-container" [class]="variantClass + ' ' + sizeClass + ' ' + colorClass">
  <!-- Circular Spinner -->
  @if (variant === 'circular') {
    <div class="spinner-circular">
      <svg class="spinner-svg" viewBox="0 0 50 50">
        <circle
          class="spinner-track"
          cx="25"
          cy="25"
          r="20"
          fill="none"
          stroke-width="4">
        </circle>
        <circle
          class="spinner-path"
          cx="25"
          cy="25"
          r="20"
          fill="none"
          stroke-width="4"
          stroke-linecap="round">
        </circle>
      </svg>
    </div>
  }

  <!-- Linear Spinner -->
  @if (variant === 'linear') {
    <div class="spinner-linear">
      <div class="spinner-linear-track">
        <div class="spinner-linear-bar spinner-linear-bar-1"></div>
        <div class="spinner-linear-bar spinner-linear-bar-2"></div>
      </div>
    </div>
  }

  <!-- Dots Spinner -->
  @if (variant === 'dots') {
    <div class="spinner-dots">
      <div class="spinner-dot"></div>
      <div class="spinner-dot"></div>
      <div class="spinner-dot"></div>
    </div>
  }

  <!-- Message -->
  @if (message && !showTimeoutMessage) {
    <div class="spinner-message">
      {{ message }}
    </div>
  }

  <!-- Timeout Message -->
  @if (showTimeoutMessage) {
    <div class="spinner-timeout-message">
      {{ timeoutMessage }}
    </div>
  }

  <!-- Cancel Button -->
  @if (showCancelButton) {
    <button
      class="spinner-cancel-btn"
      (click)="onCancel()"
      type="button"
      aria-label="Annuler l'opération">
      {{ cancelButtonLabel }}
    </button>
  }
</div>
