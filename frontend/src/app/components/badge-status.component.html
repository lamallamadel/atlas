<ds-badge
  [status]="getDsBadgeStatus()"
  size="md"
  [showDot]="false"
  [pulse]="shouldPulse()"
  [matTooltip]="getStatusDescription()"
  matTooltipPosition="above"
  role="status"
  [attr.aria-label]="getStatusLabel() + ': ' + getStatusDescription()">
  <mat-icon class="app-badge-status__icon" aria-hidden="true">{{ getStatusIcon() }}</mat-icon>
  <span class="app-badge-status__label">{{ getStatusLabel() }}</span>
</ds-badge>
