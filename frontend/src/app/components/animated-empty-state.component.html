<div class="animated-empty-state-container" role="status" aria-live="polite">
  <div class="animated-empty-state-content">
    <!-- Lottie Animation -->
    <div class="animated-empty-state-animation">
      <app-lottie-animation
        [animationType]="animationType()"
        [width]="animationWidth()"
        [height]="animationHeight()"
        [loop]="loop()"
        [autoplay]="true"
        [showControls]="showControls()"
        (animationError)="onAnimationError($event)">
      </app-lottie-animation>
    </div>

    <!-- Title -->
    <h3 class="animated-empty-state-title">{{ title() }}</h3>

    <!-- Message -->
    @if (message()) {
      <p class="animated-empty-state-message">{{ message() }}</p>
    }

    <!-- Action buttons -->
    @if (primaryAction() || secondaryAction()) {
      <div class="animated-empty-state-actions">
        @if (primaryAction(); as primary) {
          <button
            class="btn-primary-action"
            (click)="onPrimaryClick()"
            [attr.aria-label]="primary.label">
            @if (primary.icon) {
              <mat-icon class="btn-icon">{{ primary.icon }}</mat-icon>
            }
            <span>{{ primary.label }}</span>
          </button>
        }
        @if (secondaryAction(); as secondary) {
          <button
            class="btn-secondary-action"
            (click)="onSecondaryClick()"
            [attr.aria-label]="secondary.label">
            @if (secondary.icon) {
              <mat-icon class="btn-icon">{{ secondary.icon }}</mat-icon>
            }
            <span>{{ secondary.label }}</span>
          </button>
        }
      </div>
    }

    <!-- Help link -->
    @if (helpLink(); as help) {
      <div class="animated-empty-state-help">
        <a
          href="javascript:void(0)"
          class="help-link"
          (click)="onHelpLinkClick()"
          [attr.aria-label]="help.label">
          <mat-icon class="help-icon">help_outline</mat-icon>
          <span>{{ help.label }}</span>
        </a>
      </div>
    }
  </div>
</div>
