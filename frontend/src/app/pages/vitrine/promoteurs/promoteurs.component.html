<section class="at-page-hero"><div class="at-container at-page-hero-content">
  <p class="at-page-hero-eyebrow">Solution Promoteurs</p>
  <h1 class="at-page-hero-title">Atlasia pour les promoteurs immobiliers</h1>
  <p class="at-page-hero-lead">Gérez vos programmes, diffusez vos lots et collectez les réservations en ligne depuis une seule plateforme.</p>
</div></section>
<section class="at-section"><div class="at-container">
  <div class="at-features-grid">
    @for (f of features; track f) {
      <div class="at-card"><div class="at-card-icon" style="font-size:1.25rem;">{{f.icon}}</div><div class="at-card-title">{{f.title}}</div><div class="at-card-body">{{f.desc}}</div></div>
    }
  </div>
  <div style="text-align:center;margin-top:var(--ds-space-12);"><a routerLink="/biz/demo" class="at-btn at-btn-primary at-btn-lg">Demander une démo promoteurs</a></div>
</div></section>
