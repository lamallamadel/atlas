<ds-auth-hero
  eyebrow="Espace Pro"
  titleBefore="Trouvez le bien qui"
  titleAccent="vous ressemble."
  subtitle="Connexion sécurisée à votre espace immobilier."
  heroDisplay="Find the place that feels right."
  heroSub="Propriétés sélectionnées, propriétaires vérifiés, une façon plus sereine d'investir.">

  <!-- Erreur globale -->
  @if (errorMessage) {
    <div class="login-error" role="alert" aria-live="assertive">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 5v3M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
  }

  <!-- Org ID (compact) -->
  <div class="login-field">
    <label class="login-label" for="orgId">Organisation</label>
    <input
      id="orgId"
      class="login-input"
      type="text"
      placeholder="ORG-001"
      formControlName="orgId"
      [formGroup]="loginForm"
      [disabled]="isLoading"
      aria-describedby="orgId-hint" />
    <span id="orgId-hint" class="login-hint">Identifiant de votre organisation</span>
  </div>

  <!-- Connexion Keycloak (action principale) -->
  <button
    class="login-btn login-btn--marine"
    type="button"
    (click)="loginWithKeycloak()"
    [disabled]="isLoading"
    [class.login-btn--loading]="isLoading"
    aria-label="Se connecter via Keycloak">
    @if (isLoading) {
      <span class="login-btn__spinner" aria-hidden="true"></span>
    }
    Se connecter avec Keycloak
  </button>

  <!-- Séparateur -->
  <div class="login-sep" role="separator" aria-label="Ou continuer avec">
    <span>ou accès développeur</span>
  </div>

  <!-- Token JWT -->
  <form [formGroup]="loginForm" (ngSubmit)="login()" class="login-dev-form">
    <div class="login-field">
      <label class="login-label" for="token">Token JWT</label>
      <textarea
        id="token"
        class="login-input login-input--textarea"
        formControlName="token"
        placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9…"
        rows="3"
        [disabled]="isLoading"
        aria-describedby="token-hint"></textarea>
      <span id="token-hint" class="login-hint">Token JWT pour développement local</span>
    </div>

    <div class="login-dev-row">
      <button
        class="login-btn login-btn--ghost"
        type="submit"
        [disabled]="isLoading || loginForm.invalid"
        [class.login-btn--loading]="isLoading">
        @if (isLoading) {
          <span class="login-btn__spinner login-btn__spinner--dark" aria-hidden="true"></span>
        }
        Token custom
      </button>
      <button
        class="login-btn login-btn--ghost"
        type="button"
        (click)="mockOidcLogin()"
        [disabled]="isLoading">
        Mock User
      </button>
      <button
        class="login-btn login-btn--ghost login-btn--danger"
        type="button"
        (click)="mockAdminLogin()"
        [disabled]="isLoading">
        Mock Admin
      </button>
    </div>
  </form>

  <p class="login-legal">
    En vous connectant, vous acceptez les
    <a href="/biz" tabindex="0">Conditions d'utilisation</a>
    et la
    <a href="/portail/confidentialite" tabindex="0">Politique de confidentialité</a>.
  </p>

</ds-auth-hero>
