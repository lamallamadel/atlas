  .stage-step { display:flex; flex:1; align-items:center; gap:10px; }
  .stage-pill { flex:1; height:8px; border-radius:4px; background:var(--surface-offset); }
  .stage-pill.done { background: var(--marine); }
  .stage-pill.now { background: var(--primary); }
  .timeline { position:relative; padding-left:22px; }
  .timeline::before { content:''; position:absolute; left:7px; top:6px; bottom:0; width:1px; background:var(--divider); }
  .timeline-evt { position:relative; padding: 0 0 18px 0; }
  .timeline-evt::before { content:''; position:absolute; left:-22px; top:6px; width:8px; height:8px; border-radius:4px; background:var(--primary); border:2px solid var(--surface); box-shadow:0 0 0 1px var(--primary); }
  .timeline-evt.marine::before { background: var(--marine); box-shadow:0 0 0 1px var(--marine); }
  .timeline-evt.muted::before { background: var(--text-faint); box-shadow:0 0 0 1px var(--text-faint); }
  .msg { padding:10px 14px; border-radius:14px; max-width:78%; font-size:13.5px; line-height:1.45; }
  .msg.them { background: var(--surface-offset); color: var(--text); border-top-left-radius:4px; }
  .msg.me { background: var(--marine); color: #fff; border-top-right-radius:4px; margin-left:auto; }

  .ios-back { display:flex; align-items:center; gap:4px; color:var(--marine); font-size:14px; font-weight:500; }
  [data-theme="dark"] .ios-back { color: var(--marine-light); }
  .seg { display:flex; background:var(--surface-offset); border-radius:9px; padding:2px; }
  .seg button { flex:1; background:transparent; border:none; padding:7px 10px; font-family:inherit; font-size:13px; font-weight:500; color:var(--text-muted); border-radius:7px; }
  .seg button.on { background:var(--surface); color:var(--text); box-shadow:var(--shadow-xs); font-weight:600; }
