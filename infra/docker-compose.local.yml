# Local Development Stack - Minimal but Complete
# Starts: Frontend (Angular), Backend (Spring), 3 Brain Services, H2, Redis, llama.cpp
#
# Usage:
#   cd infra
#   docker compose -f docker-compose.local.yml up
#
# Access:
#   Frontend: http://localhost (Angular app)
#   Backend API: http://localhost:8080
#   H2 Console: http://localhost:8083
#   Brain Services: localhost:8000-8002
#   llama.cpp: localhost:8008 (optional, add --profile llama)

services:
  # ========== DATABASE & CACHE ==========
  h2:
    image: oscarfonts/h2:latest
    container_name: h2_db
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "8083:8082"
    environment:
      H2_OPTIONS: "-ifNotExists -trace"
      INIT_DB_FILENAME: atlas
    volumes:
      - h2_data:/opt/h2-data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== BACKEND API ==========
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: backend_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      h2:
        condition: service_healthy
      redis:
        condition: service_healthy
      scoring-service:
        condition: service_healthy
      dupli-service:
        condition: service_healthy
      fraud-service:
        condition: service_healthy
    environment:
      # Use H2 instead of PostgreSQL for local dev
      SPRING_DATASOURCE_URL: jdbc:h2:tcp://h2:9092/atlas;MODE=PostgreSQL
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
      
      SPRING_PROFILES_ACTIVE: h2,local

      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_REDIS_ENABLED: "true"

      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://localhost"

      # Local LLM endpoints (llama.cpp)
      BRAIN_SCORING_URL: http://scoring-service:8000
      BRAIN_DUPLI_URL: http://dupli-service:8001
      BRAIN_FRAUD_URL: http://fraud-service:8002
      BRAIN_API_KEY: local-dev

      # Disable OAuth2 & Elasticsearch for local
      OAUTH2_ENABLED: "false"
      ELASTICSEARCH_ENABLED: "false"

      APP_ENV: local
      JAVA_OPTS: "-Xmx1g -Xms512m"
    volumes:
      - backend_logs:/var/log/atlas
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ========== FRONTEND (Angular) ==========
  frontend:
    image: node:18-alpine
    container_name: frontend_dev
    restart: unless-stopped
    ports:
      - "4200:4200"
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: >
      sh -c "npm ci --prefer-offline &&
             npm start -- --poll 2000 --host 0.0.0.0"
    environment:
      NODE_ENV: development
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4200" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 90s

  # ========== NGINX REVERSE PROXY ==========
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx_local
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ========== BRAIN SERVICES (Minimal) ==========
  scoring-service:
    build:
      context: ../brain/scoring-service
      dockerfile: Dockerfile
    container_name: brain_scoring
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      API_KEY: local-dev
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 20s

  dupli-service:
    build:
      context: ../brain/dupli-service
      dockerfile: Dockerfile
    container_name: brain_dupli
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      API_KEY: local-dev
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 20s

  fraud-service:
    build:
      context: ../brain/fraud-service
      dockerfile: Dockerfile
    container_name: brain_fraud
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      API_KEY: local-dev
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 20s

  # ========== LOCAL LLM (Optional) ==========
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server-latest
    container_name: llama_cpp_server
    restart: unless-stopped
    ports:
      - "8008:8000"
    volumes:
      - ./models:/models
    environment:
      N_GPU_LAYERS: 0
      N_THREADS: 4
    command: >
      -m /models/model.gguf
      --host 0.0.0.0
      --port 8000
      -n 256
      --ctx-size 1024
      -t 4
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles: [ "llama" ]

volumes:
  h2_data:
  redis_data:
  backend_logs:
