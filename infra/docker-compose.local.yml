# Local development stack with H2 database
# Start with: docker compose -f docker-compose.local.yml up

services:
  # H2 Database (embedded, in-memory for speed)
  h2:
    image: oscarfonts/h2:latest
    container_name: h2_db
    restart: unless-stopped
    ports:
      - "${H2_PORT:-9092}:9092"
      - "${H2_CONSOLE_PORT:-8083}:8082"
    environment:
      H2_OPTIONS: "-ifNotExists -trace"
      INIT_DB_FILENAME: atlas
    volumes:
      - h2_data:/opt/h2-data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Static frontend (serves dist/ if built)
  nginx:
    image: nginx:alpine
    container_name: nginx_local
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist/frontend:/usr/share/nginx/html:ro
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  h2_data:
    name: h2_data_local
  redis_data:
    name: redis_data_local
