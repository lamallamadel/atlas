server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Serve static frontend
    root /usr/share/nginx/html;
    index index.html;

    # Angular routing (SPA): route all 404s to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
